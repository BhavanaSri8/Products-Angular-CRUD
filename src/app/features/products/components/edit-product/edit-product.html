<div class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50 py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <!-- Header -->
    <h2 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600 mb-8">Edit Product</h2>

    <!-- Loading State -->
    <div *ngIf="isLoading" class="bg-white rounded-lg shadow-2xl p-8 text-center border border-pink-200">
      <p class="text-gray-600 text-lg">Loading product...</p>
    </div>

    <!-- Success Message -->
    <div *ngIf="!isLoading && successMessage" class="mb-6 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
      {{ successMessage }}
    </div>
    
    <!-- Error Message -->
    <div *ngIf="!isLoading && errorMessage" class="mb-6 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form *ngIf="!isLoading" (ngSubmit)="updateProduct()" class="bg-white rounded-lg shadow-2xl p-8 border border-pink-200">
      <!-- Product Name -->
      <div class="mb-6">
        <label for="name" class="block text-pink-600 font-bold mb-2">Product Name *</label>
        <input 
          type="text" 
          id="name" 
          [(ngModel)]="name" 
          name="name"
          placeholder="Enter product name"
          required
          class="w-full px-4 py-2 border border-pink-300 rounded-lg bg-pink-50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
        />
      </div>

      <!-- Price -->
      <div class="mb-6">
        <label for="price" class="block text-pink-600 font-bold mb-2">Price *</label>
        <input 
          type="number" 
          id="price" 
          [(ngModel)]="price" 
          name="price"
          placeholder="Enter product price"
          step="0.01"
          required
          class="w-full px-4 py-2 border border-pink-300 rounded-lg bg-pink-50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
        />
      </div>

      <!-- Description -->
      <div class="mb-6">
        <label for="description" class="block text-pink-600 font-bold mb-2">Description *</label>
        <textarea 
          id="description" 
          [(ngModel)]="description" 
          name="description"
          placeholder="Enter product description"
          rows="4"
          required
          class="w-full px-4 py-2 border border-pink-300 rounded-lg bg-pink-50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
        ></textarea>
      </div>

      <!-- Quantity -->
      <div class="mb-8">
        <label for="quantity" class="block text-pink-600 font-bold mb-2">Quantity *</label>
        <input 
          type="number" 
          id="quantity" 
          [(ngModel)]="quantity" 
          name="quantity"
          placeholder="Enter product quantity"
          required
          class="w-full px-4 py-2 border border-pink-300 rounded-lg bg-pink-50 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-pink-500 focus:ring-1 focus:ring-pink-500 transition"
        />
      </div>

      <!-- Buttons -->
      <div class="flex gap-4">
        <button 
          type="submit" 
          class="flex-1 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 rounded-lg transition duration-200 shadow-lg hover:shadow-xl"
        >
          Update Product
        </button>
        <button 
          type="button" 
          (click)="cancel()"
          class="flex-1 bg-gradient-to-r from-gray-300 to-gray-400 hover:from-gray-400 hover:to-gray-500 text-gray-800 font-bold py-3 rounded-lg transition duration-200"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
