<div class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50 py-8 px-4">
  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600">Products Management</h1>
      <button 
        (click)="navigateToAdd()"
        class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-lg hover:shadow-xl"
      >
        + Add Product
      </button>
    </div>

    <!-- Products Table -->
    <div *ngIf="products.length > 0" class="bg-white rounded-lg shadow-2xl overflow-hidden border border-pink-100">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gradient-to-r from-pink-500 to-purple-500 text-white">
            <tr>
              <th class="px-6 py-4 text-left font-semibold">ID</th>
              <th class="px-6 py-4 text-left font-semibold">Name</th>
              <th class="px-6 py-4 text-left font-semibold">Price</th>
              <th class="px-6 py-4 text-left font-semibold">Description</th>
              <th class="px-6 py-4 text-left font-semibold">Quantity</th>
              <th class="px-6 py-4 text-center font-semibold">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let product of products; let i = index" 
                [class]="i % 2 === 0 ? 'bg-pink-50' : 'bg-white'" 
                class="border-b border-pink-100 hover:bg-pink-100 transition duration-150">
              <td class="px-6 py-4 text-gray-700">{{ product.id }}</td>
              <td class="px-6 py-4 font-semibold text-gray-800">{{ product.name }}</td>
              <td class="px-6 py-4 text-pink-600 font-semibold">${{ product.price.toFixed(2) }}</td>
              <td class="px-6 py-4 text-gray-600">{{ product.description }}</td>
              <td class="px-6 py-4">
                <span class="bg-purple-100 text-purple-800 px-3 py-1 rounded-full text-sm font-medium border border-purple-200">
                  {{ product.quantity }}
                </span>
              </td>
              <td class="px-6 py-4 text-center space-x-2">
                <button 
                  (click)="navigateToEdit(product.id)"
                  class="bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-200 inline-block shadow-md"
                >
                  Edit
                </button>
                <button 
                  (click)="deleteProduct(product.id)"
                  class="bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white font-semibold py-2 px-4 rounded transition duration-200 inline-block shadow-md"
                >
                  Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="products.length === 0" class="bg-white rounded-lg shadow-2xl p-8 text-center border border-pink-100">
      <p class="text-gray-500 text-lg mb-4">No products available.</p>
      <button 
        (click)="navigateToAdd()"
        class="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-2 px-6 rounded-lg transition duration-200 shadow-lg hover:shadow-xl"
      >
        Create Your First Product
      </button>
    </div>
  </div>
</div>
